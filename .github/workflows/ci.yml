name: CI - Validate & Lint

on:
  pull_request:
    branches: [main]

  # Also run on push to development for early feedback
  push:
    branches: [development]

jobs:
  validate:
    name: Validate HTML, CSS & JS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ---------- HTML Validation ----------
      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate HTML
        run: |
          echo '{ "extends": ["html-validate:recommended"], "rules": { "no-inline-style": "off", "no-trailing-whitespace": "off", "attr-quotes": "off" } }' > .htmlvalidate.json
          html-validate "**/*.html" --formatter stylish

      # ---------- CSS Lint ----------
      - name: Install stylelint
        run: |
          npm install -g stylelint stylelint-config-standard

      - name: Lint CSS
        run: |
          echo '{ "extends": "stylelint-config-standard", "rules": { "no-duplicate-selectors": null, "declaration-block-no-duplicate-properties": [true, { "ignore": ["consecutive-duplicates-with-different-values"] }], "alpha-value-notation": null, "color-function-notation": null, "shorthand-property-no-redundant-values": null, "declaration-block-no-redundant-longhand-properties": null } }' > .stylelintrc.json
          stylelint "css/**/*.css" --allow-empty-input || true

      # ---------- JS Lint ----------
      - name: Install ESLint
        run: npm install -g eslint

      - name: Lint JavaScript
        run: |
          echo '{ "env": { "browser": true, "es2021": true }, "parserOptions": { "ecmaVersion": "latest" }, "rules": { "no-unused-vars": "warn", "no-undef": "error", "semi": ["warn", "always"] } }' > .eslintrc.json
          eslint "js/**/*.js" || true

  # ---------- Lighthouse Performance ----------
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse
        run: |
          lhci autorun --collect.staticDistDir=. --collect.numberOfRuns=1 --assert.assertions.categories:performance=off --assert.assertions.categories:accessibility=off --assert.assertions.categories:best-practices=off --assert.assertions.categories:seo=off || true

      - name: Upload Lighthouse Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14
